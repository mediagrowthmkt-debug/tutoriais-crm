<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutoriais CRM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #EEF2F7;
    --card: #ffffff;
    --orange: #E86B2A;
    --orange-muted: rgba(232,107,42,0.10);
    --border: rgba(0,0,0,0.08);
    --border-orange: rgba(232,107,42,0.30);
    --white: #111111;
    --gray: #888;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--white);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 52px;
    padding: 48px 24px;
  }

  /* logo */
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    background: var(--orange);
    border-radius: 50%;
    box-shadow: 0 0 0 3px var(--orange-muted);
    flex-shrink: 0;
  }

  .logo-text {
    font-weight: 600;
    font-size: 16px;
    color: var(--white);
    letter-spacing: -0.2px;
  }

  /* grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    width: 100%;
    max-width: 480px;
  }

  /* card */
  .card {
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 28px 22px;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 14px;
    transition: border-color 0.18s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .card:hover, .card:active {
    border-color: var(--border-orange);
    transform: translateY(-2px);
  }

  .card.disabled {
    opacity: 0.38;
    pointer-events: none;
  }

  .card-icon {
    font-size: 26px;
  }

  .card-preview {
    width: 100%;
    border-radius: 8px;
    overflow: hidden;
    border: 0.5px solid var(--border);
    aspect-ratio: 16/9;
  }

  .card-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .card-label {
    font-size: 15px;
    font-weight: 600;
    color: var(--white);
    letter-spacing: -0.1px;
  }

  .card-sub {
    font-size: 12px;
    color: var(--gray);
    letter-spacing: 0.04em;
  }

  /* footer */
  .footer {
    font-size: 11px;
    color: var(--gray);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* mobile */
  @media (max-width: 400px) {
    .grid {
      grid-template-columns: 1fr 1fr;
    }
    body { gap: 40px; padding: 40px 20px; }
  }
</style>
</head>
<body>

  <div class="logo">
    <div class="logo-dot"></div>
    <span class="logo-text">Media Growth</span>
  </div>

  <div class="grid">

    <a class="card" href="loom-conversas.html">
      <div class="card-preview">
        <img src="fotos menu/conversas.png" alt="Preview Conversas">
      </div>
      <div class="card-label">Conversas</div>
      <div class="card-sub">Ver tutorial →</div>
    </a>

    <a class="card" href="loom-oportunidades.html">
      <div class="card-preview">
        <img src="fotos menu/oportunidades.png" alt="Preview Oportunidades">
      </div>
      <div class="card-label">Oportunidades</div>
      <div class="card-sub">Ver tutorial →</div>
    </a>

  </div>

  <span class="footer">Tutoriais CRM</span>

</body>
</html>
