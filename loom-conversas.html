<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutoriais — Conversas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #EEF2F7;
    color: #1a1a1a;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 28px 20px 40px;
  }

  .header {
    margin-bottom: 22px;
  }

  .header h1 {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #999;
  }

  .header p {
    font-size: 24px;
    font-weight: 600;
    color: #111;
    margin-top: 4px;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 20px;
    align-items: flex-start;
    max-width: 1140px;
  }

  .player-col { width: 100%; }

  .ratio {
    position: relative;
    width: 100%;
    padding-top: 56.25%;
    background: #1a1a1a;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid #222;
  }

  .ratio iframe,
  .ratio img {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
    object-fit: cover;
  }

  .ratio .play-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    width: 68px; height: 68px;
    background: rgba(0,0,0,0.55);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s;
  }

  .ratio .play-btn:hover {
    background: rgba(0,0,0,0.75);
  }

  .ratio .play-btn::after {
    content: '';
    width: 0; height: 0;
    border-top: 12px solid transparent;
    border-bottom: 12px solid transparent;
    border-left: 20px solid #fff;
    margin-left: 4px;
  }

  .now-info {
    margin-top: 16px;
    padding: 0 2px;
  }

  .now-title {
    font-size: 18px;
    font-weight: 600;
    color: #111;
    line-height: 1.4;
  }

  .now-tag {
    display: inline-block;
    margin-top: 8px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #666;
    background: #e2e8f0;
    border: 1px solid #d0d7e3;
    border-radius: 4px;
    padding: 3px 9px;
  }

  .navrow {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }

  .navrow button {
    padding: 11px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    border-radius: 9px;
    border: 1px solid #d0d7e3;
    background: #ffffff;
    color: #444;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .navrow button:hover, .navrow button:active {
    background: #e2e8f0;
    color: #111;
    border-color: #bbc4d0;
  }

  .navrow button:disabled {
    opacity: 0.3;
    cursor: default;
  }

  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .sidebar-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #999;
    padding: 0 4px;
    margin-bottom: 6px;
  }

  .item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 14px;
    border-radius: 10px;
    border: 1px solid #dde3ec;
    background: #ffffff;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .item:hover, .item:active {
    background: #f4f7fb;
    border-color: #c8d1de;
  }

  .item.active {
    background: #f0f4fa;
    border-color: #b8c4d4;
  }

  .item-num {
    font-size: 12px;
    font-weight: 600;
    color: #bbb;
    padding-top: 2px;
    flex-shrink: 0;
    width: 16px;
  }

  .item.active .item-num {
    color: #555;
  }

  .item-icon {
    width: 56px;
    height: 38px;
    flex-shrink: 0;
    border-radius: 5px;
    background: #dce3ed;
    border: 1px solid #cdd5e1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .item-icon img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .item-icon .play-tri {
    position: absolute;
    width: 0; height: 0;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    border-left: 9px solid rgba(255,255,255,0.85);
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4));
  }

  /* fallback play icon when no thumbnail */
  .item-icon::after {
    content: '';
    width: 0; height: 0;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    border-left: 9px solid #a0aab8;
    margin-left: 2px;
  }

  .item-icon.has-thumb::after {
    display: none;
  }

  .item.active .item-icon::after {
    border-left-color: #555;
  }

  .item-meta { flex: 1; min-width: 0; }

  .item-title {
    font-size: 14px;
    font-weight: 500;
    color: #777;
    line-height: 1.4;
  }

  .item.active .item-title { color: #111; }

  .item-sub {
    font-size: 11px;
    color: #aaa;
    margin-top: 3px;
  }

  .item.active .item-sub { color: #666; }

  /* MOBILE */
  @media (max-width: 720px) {
    body { padding: 20px 16px 48px; }
    .header p { font-size: 20px; }
    .layout {
      grid-template-columns: 1fr;
    }
    .sidebar {
      margin-top: 8px;
    }
    .now-title { font-size: 16px; }
    .navrow button { flex: 1; text-align: center; padding: 12px 10px; }
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    color: #777;
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid #dde3ec;
    background: #ffffff;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    margin-bottom: 16px;
  }

  .back-link:hover {
    background: #e2e8f0;
    color: #111;
    border-color: #bbc4d0;
  }
</style>
</head>
<body>

<a class="back-link" href="index.html">← Voltar ao menu</a>

<div class="header">
  <h1>Tutoriais CRM</h1>
  <p>Conversas</p>
</div>

<div class="layout">
  <div class="player-col">
    <div class="ratio" id="player">
      <iframe id="frame" src="https://www.loom.com/embed/1daf511e0a6a4ee7ac9dd1832b0d2c67" allowfullscreen allow="autoplay"></iframe>
    </div>
    <div class="now-info">
      <p class="now-title" id="ntitle">Gerenciando Leads pelo Aplicativo CRM [Whatsapp]</p>
      <span class="now-tag" id="nsub">Conversas · Celular</span>
    </div>
    <div class="navrow">
      <button id="bprev" onclick="go(-1)" disabled>← Anterior</button>
      <button id="bnext" onclick="go(1)">Próximo →</button>
    </div>
  </div>

  <div class="sidebar">
    <p class="sidebar-label">Playlist</p>
    <div id="list"></div>
  </div>
</div>

<script>
const vids = [
  { id: "1daf511e0a6a4ee7ac9dd1832b0d2c67", title: "Gerenciando Leads pelo Aplicativo CRM [Whatsapp]", sub: "Conversas · Celular" },
  { id: "2d6c7059daa24395bf535e1397d0e127", title: "Gerenciando Leads pelo WhatsApp API", sub: "Conversas · Computador" },
  { id: "2ead5898063e4cdba28146ffbf17ced8", title: "WhatsApp não Oficial x WhatsApp API", sub: "Conversas · Computador" },
];

let cur = 0;
const playerEl = document.getElementById("player");
const thumbCache = {};

// Build playlist once
const listEl = document.getElementById("list");
const items = [];

vids.forEach((v, i) => {
  const d = document.createElement("div");
  d.className = "item" + (i === 0 ? " active" : "");
  d.innerHTML = `
    <span class="item-num">${i + 1}</span>
    <div class="item-icon"></div>
    <div class="item-meta">
      <p class="item-title">${v.title}</p>
      <p class="item-sub">${v.sub}</p>
    </div>`;
  d.onclick = () => { cur = i; load(); };
  listEl.appendChild(d);
  items.push(d);
});

// Fetch all thumbnails via oEmbed
Promise.all(vids.map(async (v, i) => {
  try {
    const r = await fetch(`https://www.loom.com/v1/oembed?url=https://www.loom.com/share/${v.id}`);
    const data = await r.json();
    if (data.thumbnail_url) {
      const staticUrl = data.thumbnail_url.replace('.gif', '.jpg');
      thumbCache[v.id] = staticUrl;
      // Update playlist icon
      const icon = items[i].querySelector(".item-icon");
      icon.classList.add("has-thumb");
      icon.innerHTML = `<img src="${staticUrl}" alt=""><div class="play-tri"></div>`;
    }
  } catch(e) {}
}));

function updateActive() {
  items.forEach((el, i) => el.classList.toggle("active", i === cur));
}

function load() {
  const v = vids[cur];
  document.getElementById("frame").src = `https://www.loom.com/embed/${v.id}`;
  document.getElementById("ntitle").textContent = v.title;
  document.getElementById("nsub").textContent = v.sub;
  document.getElementById("bprev").disabled = cur === 0;
  document.getElementById("bnext").disabled = cur === vids.length - 1;
  updateActive();
}

function go(d) { cur = Math.max(0, Math.min(vids.length - 1, cur + d)); load(); }
</script>

</body>
</html>
